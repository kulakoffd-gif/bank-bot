name: Bank check

on:
  schedule:
    # 4 запуска в час со смещением 2,17,32,47 — избегаем :00 (пик нагрузки GitHub)
    - cron: '2,17,32,47 5-13 * * 1-5'
    # дублирующий ряд со смещением 8,23,38,53 — страховка на случай задержки
    - cron: '8,23,38,53 5-13 * * 1-5'
  workflow_dispatch:  # ручной запуск кнопкой "Run workflow" на GitHub

permissions:
  contents: write   # для коммита обновлённого state.json

concurrency:
  group: bank-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium --with-deps

      - name: Install Playwright system deps (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Run bank check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          BANK_LOGIN:         ${{ secrets.BANK_LOGIN }}
          BANK_PASSWORD:      ${{ secrets.BANK_PASSWORD }}
          BANK_ACCOUNT_IBAN:  ${{ secrets.BANK_ACCOUNT_IBAN }}
          AMO_TOKEN:          ${{ secrets.AMO_TOKEN }}
          AMO_SUBDOMAIN:      ${{ secrets.AMO_SUBDOMAIN }}
        run: python check.py

      - name: Upload debug HTML (statements page)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: statements-debug
          path: |
            /tmp/*.html
            /tmp/*.png
            /tmp/*.json
            /tmp/*.txt
          if-no-files-found: ignore
          retention-days: 1

      - name: Commit updated state (race-safe)
        run: |
          set -e
          git config user.name  "bank-bot"
          git config user.email "bank-bot@users.noreply.github.com"

          # Сохраняем наш свежий state перед любыми pull/reset
          cp state.json /tmp/our_state.json

          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main

            python3 merge_state.py /tmp/our_state.json

            if git diff --quiet -- state.json; then
              echo "No state changes after merge (attempt $attempt)"
              exit 0
            fi

            git add state.json
            git commit -m "state: update [skip ci]"

            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi

            echo "Push rejected on attempt $attempt — retrying with fresh main…"
            sleep 1
          done

          echo "Push failed after 3 attempts" >&2
          exit 1
